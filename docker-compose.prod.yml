services:
  api:
    build:
      context: .
      dockerfile: backend/Garmetix.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5080
      Database__AutoMigrate: "${DATABASE_AUTO_MIGRATE:-true}"
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__Issuer: "${JWT_ISSUER}"
      Jwt__Audience: "${JWT_AUDIENCE}"
      Jwt__SigningKey: "${JWT_SIGNING_KEY}"
      PasswordReset__FrontendBaseUrl: "${PASSWORD_RESET_FRONTEND_BASE_URL}"
      Email__Enabled: "${EMAIL_ENABLED:-false}"
      Email__Host: "${EMAIL_HOST}"
      Email__Port: "${EMAIL_PORT:-587}"
      Email__EnableSsl: "${EMAIL_ENABLE_SSL:-true}"
      Email__UserName: "${EMAIL_USERNAME}"
      Email__Password: "${EMAIL_PASSWORD}"
      Email__FromEmail: "${EMAIL_FROM_EMAIL}"
      Email__FromName: "${EMAIL_FROM_NAME:-Garmetix}"
      Email__ReplyToEmail: "${EMAIL_REPLY_TO_EMAIL}"
      PayrollAutomation__Enabled: "${PAYROLL_AUTOMATION_ENABLED:-true}"
      PayrollAutomation__TimeZoneId: "${PAYROLL_AUTOMATION_TIME_ZONE:-Asia/Kolkata}"
      PayrollAutomation__RunHour: "${PAYROLL_AUTOMATION_RUN_HOUR:-2}"
      PayrollAutomation__RunMinute: "${PAYROLL_AUTOMATION_RUN_MINUTE:-0}"
      PayrollAutomation__RunOnStartup: "${PAYROLL_AUTOMATION_RUN_ON_STARTUP:-true}"
      Backup__Enabled: "${BACKUP_ENABLED:-true}"
      Backup__Directory: /app/backups
      Backup__TimeZoneId: "${BACKUP_TIME_ZONE:-Asia/Kolkata}"
      Backup__RunHour: "${BACKUP_RUN_HOUR:-2}"
      Backup__RunMinute: "${BACKUP_RUN_MINUTE:-30}"
      Backup__RunOnStartup: "${BACKUP_RUN_ON_STARTUP:-false}"
      Backup__RetentionCount: "${BACKUP_RETENTION_COUNT:-14}"
      GoogleDriveBackup__Enabled: "${GOOGLE_DRIVE_BACKUP_ENABLED:-false}"
      GoogleDriveBackup__UploadOnBackup: "${GOOGLE_DRIVE_UPLOAD_ON_BACKUP:-true}"
      GoogleDriveBackup__ServiceAccountJsonPath: /app/secrets/google-drive-service-account.json
      GoogleDriveBackup__FolderId: "${GOOGLE_DRIVE_FOLDER_ID}"
      GstinLookup__Enabled: "${GSTIN_LOOKUP_ENABLED:-false}"
      GstinLookup__BaseUrl: "${GSTIN_LOOKUP_BASE_URL:-}"
      GstinLookup__UrlTemplate: "${GSTIN_LOOKUP_URL_TEMPLATE:-}"
      GstinLookup__ApiKey: "${GSTIN_LOOKUP_API_KEY:-}"
      GstinLookup__ApiKeyHeaderName: "${GSTIN_LOOKUP_API_KEY_HEADER:-x-api-key}"
      GstinLookup__SourceName: "${GSTIN_LOOKUP_SOURCE_NAME:-Configured GSTIN Provider}"
      OracleSync__Enabled: "${ORACLE_SYNC_ENABLED:-false}"
      OracleSync__RunOnStartup: "${ORACLE_SYNC_RUN_ON_STARTUP:-false}"
      OracleSync__IntervalSeconds: "${ORACLE_SYNC_INTERVAL_SECONDS:-300}"
      OracleSync__BatchSize: "${ORACLE_SYNC_BATCH_SIZE:-250}"
      OracleSync__ConnectionString: "${ORACLE_SYNC_CONNECTION_STRING:-}"
      OracleSync__Schema: "${ORACLE_SYNC_SCHEMA:-}"
      OracleSync__TenantId: "${ORACLE_SYNC_TENANT_ID:-garmetix-default}"
      OracleSync__SourceApplication: "${ORACLE_SYNC_SOURCE_APPLICATION:-GarmetixWeb}"
      OracleSync__Direction: "${ORACLE_SYNC_DIRECTION:-PushToOracle}"
      OracleSync__ConflictPolicy: "${ORACLE_SYNC_CONFLICT_POLICY:-ManualReview}"
      OracleSync__PullExternalEvents: "${ORACLE_SYNC_PULL_EXTERNAL_EVENTS:-true}"
      OracleSync__ApplyInboundAutomatically: "${ORACLE_SYNC_APPLY_INBOUND_AUTOMATICALLY:-false}"
      OracleSync__WalletDirectory: "${ORACLE_SYNC_WALLET_DIRECTORY:-}"
      OracleSync__TnsAdmin: "${ORACLE_SYNC_TNS_ADMIN:-}"
      OracleSync__CreateOracleSchema: "${ORACLE_SYNC_CREATE_SCHEMA:-true}"
      OracleSync__PushDeletedRows: "${ORACLE_SYNC_PUSH_DELETED_ROWS:-true}"
      OracleSync__CommandTimeoutSeconds: "${ORACLE_SYNC_COMMAND_TIMEOUT_SECONDS:-60}"
      OracleSync__EntityNamesCsv: "${ORACLE_SYNC_ENTITY_NAMES:-}"
      GoogleDriveBackup__RetentionCount: "${GOOGLE_DRIVE_RETENTION_COUNT:-30}"
    ports:
      - "${API_PORT:-5080}:5080"
    volumes:
      - ./backups:/app/backups
      - ./secrets:/app/secrets:ro
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: frontend/garmetix-web/Dockerfile
    environment:
      NUXT_PUBLIC_API_BASE: "${NUXT_PUBLIC_API_BASE:-/api}"
      NUXT_API_INTERNAL_BASE: "${NUXT_API_INTERNAL_BASE:-http://api:5080/api}"
    ports:
      - "${WEB_PORT:-3000}:3000"
    restart: unless-stopped
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - garmetix_pg:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  garmetix_pg:
